<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIN_FRAME: GLOBAL_THREAT_INTEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --neon-orange: #ff9f1c;
            --bg-dark: #050b14;
            --panel-bg: rgba(10, 25, 47, 0.75);
            --panel-border: rgba(0, 240, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Share Tech Mono', monospace; user-select: none; }
        body { background-color: var(--bg-dark); color: #ffffff; overflow: hidden; height: 100vh; width: 100vw; }
        #hud-container { display: grid; grid-template-columns: 52% 48%; height: 100vh; width: 100vw; }
        #globe-viewport { width: 100%; height: 100%; position: relative; background: radial-gradient(circle at center, #0a192f 0%, #050b14 100%); }
        #globe-title { position: absolute; top: 25px; left: 25px; z-index: 10; text-shadow: 0 0 10px var(--neon-cyan); border-left: 3px solid var(--neon-cyan); padding-left: 15px; }
        #globe-title h1 { font-size: 1.6rem; color: var(--neon-cyan); letter-spacing: 2px; }
        #matrix-panel { height: 100vh; border-left: 1px solid var(--panel-border); background: linear-gradient(180deg, rgba(5,11,20,0.6) 0%, rgba(10,25,47,0.9) 100%); display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        #stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--panel-bg); border: 1px solid var(--panel-border); padding: 12px; border-radius: 4px; text-align: center; box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.05); }
        .stat-card p { font-size: 0.75rem; color: #8892b0; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card h2 { font-size: 1.6rem; color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0, 240, 255, 0.5); }
        .stat-card.alert h2 { color: var(--neon-red); text-shadow: 0 0 8px rgba(255, 49, 49, 0.5); }
        #nav-tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; border-bottom: 1px solid var(--panel-border); padding-bottom: 10px; }
        .tab-btn { background: transparent; border: 1px solid transparent; color: #8892b0; padding: 6px 12px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s ease; }
        .tab-btn:hover { color: var(--neon-cyan); background: rgba(0, 240, 255, 0.05); }
        .tab-btn.active { color: var(--bg-dark); background: var(--neon-cyan); box-shadow: 0 0 8px rgba(0, 240, 255, 0.4); font-weight: bold; }
        #tab-context-note { font-size: 0.8rem; padding: 8px 12px; margin-bottom: 15px; border-radius: 4px; display: none; }
        .banner-theme-green { color: var(--neon-green); background: rgba(57, 255, 20, 0.05); border: 1px solid rgba(57, 255, 20, 0.2); }
        .banner-theme-red { color: var(--neon-red); background: rgba(255, 49, 49, 0.07); border: 1px solid rgba(255, 49, 49, 0.3); text-shadow: 0 0 5px rgba(255, 49, 49, 0.2); }
        #table-header { display: grid; grid-template-columns: 8% 22% 30% 40%; padding: 10px; background: rgba(0, 240, 255, 0.1); border: 1px solid var(--panel-border); font-size: 0.8rem; color: var(--neon-cyan); font-weight: bold; text-transform: uppercase; border-radius: 4px 4px 0 0; }
        #log-feed-container { flex-grow: 1; background: rgba(3, 8, 16, 0.85); border: 1px solid var(--panel-border); border-top: none; border-radius: 0 0 4px 4px; overflow-y: auto; }
        .feed-item { padding: 12px 10px; border-bottom: 1px solid rgba(0, 240, 255, 0.05); font-size: 0.8rem; display: grid; grid-template-columns: 8% 22% 30% 40%; align-items: center; word-break: break-all; }
        .feed-item:hover { background: rgba(0, 240, 255, 0.04); }
        .feed-sn { color: #4e5d78; }
        .feed-item.critical-row .feed-ip, .feed-item.critical-row .feed-class { color: var(--neon-red); font-weight: bold; }
        .feed-item.scanner-row .feed-ip, .feed-item.scanner-row .feed-class { color: var(--neon-orange); font-weight: bold; }
        .feed-item.civilian-row .feed-ip, .feed-item.civilian-row .feed-class { color: var(--neon-green); font-weight: bold; }
        .feed-summary { color: #ccd6f6; line-height: 1.3; padding-left: 5px; text-transform: none; word-break: break-word; }
        .scene-tooltip { background-color: rgba(3, 8, 16, 0.95) !important; border: 1px solid var(--neon-cyan) !important; box-shadow: 0 0 12px rgba(0, 240, 255, 0.4) !important; font-family: 'Share Tech Mono', monospace !important; color: #ffffff !important; padding: 8px 12px !important; border-radius: 4px !important; font-size: 0.85rem !important; line-height: 1.4 !important; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; } ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
    </style>
</head>
<body>

    <div id="hud-container">
        <div id="globe-viewport">
            <div id="globe-title"><h1>RECON_SPHERE // LIVE_FEED</h1></div>
        </div>

        <div id="matrix-panel">
            <div id="stats-grid">
                <div class="stat-card"><p>Total Probes</p><h2 id="stat-total">0</h2></div>
                <div class="stat-card"><p>Unique IPs</p><h2 id="stat-unique">0</h2></div>
                <div class="stat-card alert"><p>Critical Threats</p><h2 id="stat-critical">0</h2></div>
            </div>

            <div id="nav-tabs">
                <button class="tab-btn active" onclick="switchView('all')">ALL_DATA</button>
                <button class="tab-btn" onclick="switchView('scanner')">SCANNERS</button>
                <button class="tab-btn" onclick="switchView('critical')">CRITICAL_THREATS</button>
                <button class="tab-btn" onclick="switchView('safe')">CIVILIAN_BUGS</button>
            </div>

            <div id="tab-context-note"></div>

            <div id="table-header">
                <span>S.N.</span> <span>Target IP</span> <span>Classification</span> <span>Analytical Summary</span>
            </div>

            <div id="log-feed-container">
                <div id="log-feed"></div>
            </div>
        </div>
    </div>

    <script>
        let fullThreatDataset = [];
        let activeFilter = 'all';
        let geocodedCache = new Map(); 
        let globeEngine = null;

        const criticalKeywords = ['exploit', 'brute', 'execution', 'injection', 'compromise', 'unintelligible binary', 'unclassified connection'];
        const civilianKeywords = ['shodan', 'censys', 'inspect', 'legitimate', 'search engine', 'shadowserver', 'academic'];

        function initGlobeSpace() {
            const container = document.getElementById('globe-viewport');
            globeEngine = Globe()(container)
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
                .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
                .backgroundImageUrl(null)
                .width(container.clientWidth)
                .height(container.clientHeight)
                .labelsData([])
                .labelLat(d => d.lat)
                .labelLng(d => d.lng)
                .labelText(d => '')
                .labelDotRadius(0.8)
                .labelColor(d => d.color)
                .labelResolution(3)
                .labelIncludeDot(true)
                .labelLabel(d => d.infoPopup);

            window.addEventListener('resize', () => {
                globeEngine.width(container.clientWidth).height(container.clientHeight);
            });
            globeEngine.controls().autoRotate = false;
        }

        async function loadThreatIntel() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/nanak011/my_threat_intel/main/threat_analysis.json');
                fullThreatDataset = await response.json();
                calculateMetrics(fullThreatDataset);
                processTelemetryMapping(fullThreatDataset);
                renderLogFeed(fullThreatDataset);
            } catch (err) { console.error("Critical Ingestion Fault.", err); }
        }

        function isCritical(classification) { return criticalKeywords.some(keyword => classification.toLowerCase().includes(keyword)); }
        function isCivilian(classification) { return civilianKeywords.some(keyword => classification.toLowerCase().includes(keyword)); }

        function calculateMetrics(data) {
            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-unique').innerText = new Set(data.map(item => item.ip)).size;
            document.getElementById('stat-critical').innerText = data.filter(item => isCritical(item.classification)).length;
        }

        async function processTelemetryMapping(entries) {
            const coordinatesArray = [];
            for (const entry of entries) {
                const targetIp = entry.ip;
                if (geocodedCache.has(targetIp)) {
                    coordinatesArray.push(geocodedCache.get(targetIp));
                    globeEngine.labelsData([...coordinatesArray]);
                    continue;
                }
                try {
                    // Using freeipapi.com for HTTPS support
                    const res = await fetch(`https://free.freeipapi.com/api/json/${targetIp}`);
                    const geo = await res.json();

                    if (geo && geo.latitude) {
                        let dotColor = isCritical(entry.classification) ? '#ff3131' : (isCivilian(entry.classification) ? '#39ff14' : '#ff9f1c');
                        const coordinatePoint = {
                            lat: geo.latitude,
                            lng: geo.longitude,
                            color: dotColor,
                            infoPopup: `<div style="text-align:left; font-family: 'Share Tech Mono', monospace;">
                                          <strong style="color:${dotColor}">[TARGET ACQUIRED]</strong><br>
                                          <strong>IP:</strong> ${targetIp}<br>
                                          <strong>GEO:</strong> ${geo.cityName}, ${geo.countryName}<br>
                                          <strong>TYPE:</strong> ${entry.classification}
                                        </div>`
                        };
                        geocodedCache.set(targetIp, coordinatePoint);
                        coordinatesArray.push(coordinatePoint);
                        globeEngine.labelsData([...coordinatesArray]);
                    }
                    await new Promise(resolve => setTimeout(resolve, 2000)); 
                } catch (error) { console.warn(`Geo-resolution missed for node: ${targetIp}`); }
            }
        }

        function renderLogFeed(data) {
            const feedContainer = document.getElementById('log-feed');
            const noteBox = document.getElementById('tab-context-note');
            feedContainer.innerHTML = '';
            const filteredData = data.filter(entry => {
                if (activeFilter === 'all') return true;
                if (activeFilter === 'scanner') return !isCritical(entry.classification) && !isCivilian(entry.classification);
                if (activeFilter === 'critical') return isCritical(entry.classification);
                if (activeFilter === 'safe') return isCivilian(entry.classification);
                return true;
            });
            filteredData.slice().reverse().forEach((entry, index) => {
                const row = document.createElement('div');
                row.className = `feed-item ${isCritical(entry.classification) ? 'critical-row' : (isCivilian(entry.classification) ? 'civilian-row' : 'scanner-row')}`;
                row.innerHTML = `<span class="feed-sn">#${filteredData.length - index}</span><span class="feed-ip">${entry.ip}</span><span class="feed-class">[${entry.classification}]</span><span class="feed-summary">${entry.summary}</span>`;
                feedContainer.appendChild(row);
            });
        }

        function switchView(viewType) {
            activeFilter = viewType;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase().includes(viewType)));
            renderLogFeed(fullThreatDataset);
        }

        initGlobeSpace();
        loadThreatIntel();
    </script>
</body>
</html>
